<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KORA LIVE | الحل النهائي</title>
    <script src="https://cdn.jsdelivr.net/npm/clappr@latest/dist/clappr.min.js"></script>
    <style>
        :root { --bg: #0f172a; --red: #e11d48; }
        body { background: var(--bg); color: white; font-family: sans-serif; text-align: center; margin: 0; }
        header { background: var(--red); padding: 15px; font-weight: bold; }
        .container { max-width: 800px; margin: 20px auto; padding: 10px; }
        #player { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 10px; overflow: hidden; margin-bottom: 20px; }
        .match-card { background: #1e293b; padding: 20px; border-radius: 12px; cursor: pointer; border: 1px solid #334155; margin-bottom: 10px; }
    </style>
</head>
<body>

<header>KORA LIVE - IPTV FIX</header>

<div class="container">
    <div id="player"></div>

    <div class="match-card" onclick="forcePlay('http://classe.iptv.newtvhd.com:8080/1901271330/5y29HpRSE60e8GD/237015')">
        شغل قناة الـ IPTV (محاولة التخطي)
    </div>
</div>

<script>
    var player;

    function forcePlay(url) {
        // نستعملوا بروكسي باش يفك الـ CORS والـ HTTP
        var proxy = "https://cors-anywhere.herokuapp.com/";
        var finalUrl = url; // جرب بلاش بروكسي الساعة، كان ما مشاش نزيدوه

        if (player) { player.destroy(); }

        player = new Clappr.Player({
            source: finalUrl,
            parentId: "#player",
            width: '100%',
            height: '100%',
            autoPlay: true,
            hlsjsConfig: {
                enableWorker: true,
                // هذي أهم حاجة باش يقبل الروابط اللي فيها مشاكل
                xhrSetup: function(xhr, url) {
                    xhr.withCredentials = false;
                }
            }
        });
    }
</script>
</body>
</html>
