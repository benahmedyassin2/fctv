<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KORA LIVE | النسخة الصاروخية</title>
    
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; margin: 0; text-align: center; }
        header { background: #e11d48; padding: 20px; font-size: 24px; font-weight: bold; }
        .container { max-width: 800px; margin: 20px auto; padding: 0 15px; }
        #player-container { display: none; margin-bottom: 20px; border: 2px solid #e11d48; border-radius: 12px; overflow: hidden; background: #000; }
        .match-card { background: #1e293b; padding: 20px; margin: 10px 0; border-radius: 12px; cursor: pointer; border: 1px solid #334155; transition: 0.3s; }
        .match-card:hover { border-color: #e11d48; }
        .btn-close { background: #334155; color: white; border: none; padding: 10px; width: 100%; cursor: pointer; }
    </style>
</head>
<body>

<header>KORA LIVE - النسخة النهائية</header>

<div class="container">
    <div id="player-container">
        <button class="btn-close" onclick="stopPlayer()">إغلاق ✕</button>
        <video id="player" playsinline controls></video>
    </div>

    <h2>اختر القناة:</h2>

    <div class="match-card" onclick="loadStream('https://v7.itworkscdn.net/elwataniatv/live/playlist.m3u8')">
        🇹🇳 الوطنية الأولى (HLS)
    </div>

    <div class="match-card" onclick="loadStream('https://static.france24.com/live/f24_ar.video/playlist.m3u8')">
        🌍 France 24 (HLS)
    </div>
</div>

<script>
    const video = document.getElementById('player');
    const player = new Plyr(video);

    function loadStream(url) {
        document.getElementById('player-container').style.display = 'block';
        
        if (Hls.isSupported()) {
            const hls = new Hls();
            hls.loadSource(url);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, function() {
                video.play();
            });
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = url;
            video.play();
        }
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function stopPlayer() {
        video.pause();
        document.getElementById('player-container').style.display = 'none';
    }
</script>
</body>
</html>
