<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KORA LIVE | كورة لايف</title>
    
    <script src="https://cdn.jsdelivr.net/npm/clappr@latest/dist/clappr.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/clappr-youtube-playback@latest/dist/clappr-youtube-playback.js"></script>

    <style>
        :root {
            --bg-color: #0f172a;
            --main-red: #e11d48;
            --card-color: #1e293b;
            --text-white: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-white);
            margin: 0;
            padding: 0;
        }

        header {
            background-color: var(--main-red);
            padding: 20px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .container {
            max-width: 900px;
            margin: 20px auto;
            padding: 0 15px;
        }

        /* منطقة مشغل الفيديو */
        #player-wrapper {
            display: none;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 25px;
            border: 2px solid var(--main-red);
        }

        #player {
            width: 100%;
            aspect-ratio: 16/9;
        }

        .close-btn {
            background: #334155;
            color: white;
            border: none;
            padding: 10px;
            width: 100%;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }
        .close-btn:hover { background: #475569; }

        /* تصميم جدول المباريات */
        .match-card {
            background-color: var(--card-color);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px;
            margin-bottom: 15px;
            cursor: pointer;
            transition: 0.3s;
            border: 1px solid #334155;
        }

        .match-card:hover {
            transform: scale(1.01);
            border-color: var(--main-red);
        }

        .team {
            flex: 1;
            text-align: center;
        }

        .team img {
            width: 60px;
            height: 60px;
            display: block;
            margin: 0 auto 10px;
            object-fit: contain;
        }

        .match-info {
            flex: 1;
            text-align: center;
        }

        .status {
            background: var(--main-red);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
        }

        .live-dot {
            height: 10px;
            width: 10px;
            background-color: #22c55e;
            border-radius: 50%;
            display: inline-block;
            margin-left: 5px;
            animation: blink 1s infinite;
        }

        @keyframes blink { 50% { opacity: 0; } }

        footer {
            text-align: center;
            padding: 30px;
            font-size: 14px;
            color: #94a3b8;
        }
    </style>
</head>
<body>

<header>KORA LIVE - بث مباشر</header>

<div class="container">
    
    <div id="player-wrapper">
        <button class="close-btn" onclick="stopPlayer()">إغلاق المشغل ✕</button>
        <div id="player"></div>
    </div>

    <h2 style="margin-bottom: 20px; border-right: 4px solid var(--main-red); padding-right: 10px;">مباريات اليوم:</h2>

    <div class="match-card" onclick="playMatch('بث مباشر - Bloomberg TV', 'https://www.bloomberg.com/media-manifest/streams/eu.m3u8')">
        <div class="team">
            <img src="https://upload.wikimedia.org/wikipedia/commons/5/5f/Bloomberg_Logo.svg" alt="Bloomberg">
            <span>Bloomberg TV</span>
        </div>
        <div class="match-info">
            <span class="status"><span class="live-dot"></span> مباشر الآن</span>
            <p style="margin-top: 10px; color: #94a3b8;">بث عالمي مباشر</p>
        </div>
        <div class="team">
            <img src="https://via.placeholder.com/60/1e293b/f8fafc?text=LIVE" alt="Live">
            <span>World News</span>
        </div>
    </div>

    <div class="match-card" onclick="playMatch('مباراة تجريبية - يوتيوب', 'https://www.youtube.com/watch?v=dQw4w9WgXcQ')">
        <div class="team">
            <img src="https://via.placeholder.com/60/1e293b/f8fafc?text=TEAM+A" alt="Team A">
            <span>فريق أ</span>
        </div>
        <div class="match-info">
            <span style="color: #94a3b8; font-weight: bold;">21:00</span>
            <p style="margin-top: 10px; font-size: 12px;">الدوري الإسباني</p>
        </div>
        <div class="team">
            <img src="https://via.placeholder.com/60/1e293b/f8fafc?text=TEAM+B" alt="Team B">
            <span>فريق ب</span>
        </div>
    </div>

</div>

<footer>جميع الحقوق محفوظة © 2026 | كورة لايف</footer>

<script>
    var mainPlayer;

    function playMatch(title, url) {
        // إظهار منطقة المشغل
        document.getElementById('player-wrapper').style.display = 'block';
        
        // إذا كان المشغل موجوداً، نقوم بتدميره لإنشاء واحد جديد
        if (mainPlayer) { mainPlayer.destroy(); }

        // إنشاء مشغل جديد باستخدام Clappr
        mainPlayer = new Clappr.Player({
            source: url,
            parentId: "#player",
            plugins: [YoutubePlayback],
            width: '100%',
            height: '100%',
            autoPlay: true,
            // معالجة تلقائية للأنواع المختلفة من الروابط
            mimeType: url.includes('.ts') ? 'video/mp2t' : (url.includes('.m3u8') ? 'application/x-mpegURL' : null),
            mediacontrol: {seekbar: "#e11d48", buttons: "#fff"},
        });

        // التمرير التلقائي لأعلى الصفحة لمشاهدة الفيديو
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function stopPlayer() {
        if (mainPlayer) {
            mainPlayer.pause();
            mainPlayer.destroy();
            mainPlayer = null;
        }
        document.getElementById('player-wrapper').style.display = 'none';
    }
</script>

</body>
</html>
